[general]
name = "holysht"
version = 1
license = "apache-2.0"
upstream = "https://github.com/NVIDIA/torch-harmonics"
backends = ["cuda"]

[general.hub]
repo-id = "chrisvoncsefalvay/holysht"

[torch]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
]
pyext = ["py"]

[kernel.holysht_legendre]
backend = "cuda"
depends = ["torch"]
src = ["cuda/fused_legendre.cu"]
cuda-capabilities = ["12.0", "12.1"]
cuda-flags = ["-O3", "--use_fast_math"]

[kernel.holysht_sht]
backend = "cuda"
depends = ["torch"]
src = ["cuda/fused_sht.cu"]
cuda-capabilities = ["12.0", "12.1"]
cuda-flags = ["-O3", "--use_fast_math"]
